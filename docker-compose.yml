services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-demo-dev
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - APP_VERSION=1.0.0
      - ENVIRONMENT=development
      - GIT_BRANCH=dev
    restart: unless-stopped
    networks:
      - app-network

  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-demo-prod
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_VERSION=1.0.0
      - ENVIRONMENT=production
      - GIT_BRANCH=prod
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
